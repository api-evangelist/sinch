- aid: sinch:numbers-api
  name: Sinch Numbers API
  description: The Sinch Numbers API enables developers to programmatically search
    for, purchase, configure, and manage phone numbers across multiple countries.
    It supports local, national, mobile, and toll-free number types that can be used
    with Sinch SMS, Voice, and Conversation APIs.
  humanURL: https://developers.sinch.com/docs/numbers
