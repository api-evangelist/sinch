aid: sinch
url: https://raw.githubusercontent.com/api-evangelist/sinch/refs/heads/main/apis.yml
apis:
  - aid: sinch:sms-api
    name: Sinch SMS API
    tags:
      - SMS
      - Messaging
      - Text Messages
      - Notifications
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://zt.us.sms.api.sinch.com
    humanURL: https://developers.sinch.com/docs/sms
    properties:
      - url: https://developers.sinch.com/docs/sms/api-reference
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-sms-openapi.yml
      - type: AsyncAPI
        url: asyncapi/sinch-sms-webhooks-asyncapi.yml
    description: >-
      The Sinch SMS API enables developers to send and receive SMS messages
      globally at scale. It supports batch messaging with scheduled delivery,
      message templates, delivery reports, and inbound message handling via
      webhooks. The API provides group management for organizing recipients,
      automatic message encoding optimization, and supports both transactional
      and marketing use cases across carriers worldwide.
  - aid: sinch:voice-api
    name: Sinch Voice API
    tags:
      - Voice
      - Calling
      - Telephony
      - Text To Speech
      - IVR
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://calling.api.sinch.com
    humanURL: https://developers.sinch.com/docs/voice
    properties:
      - url: https://developers.sinch.com/docs/voice/api-reference/authentication
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-voice-openapi.yml
      - type: AsyncAPI
        url: asyncapi/sinch-voice-callbacks-asyncapi.yml
    description: >-
      The Sinch Voice API is a programmable voice platform that allows developers
      to make, receive, and manage voice calls over PSTN, SIP, and in-app
      channels. It supports text-to-speech in over 115 languages, interactive
      voice response (IVR) menus, call recording, transcription, number masking,
      and conferencing. The API enables outbound and inbound calling with
      real-time call control through callbacks and SVAML instructions.
  - aid: sinch:verification-api
    name: Sinch Verification API
    tags:
      - Verification
      - Identity
      - Phone Numbers
      - Authentication
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://verification.api.sinch.com
    humanURL: https://developers.sinch.com/docs/verification
    properties:
      - url: https://developers.sinch.com/docs/verification/api-reference/
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-verification-openapi.yml
      - type: AsyncAPI
        url: asyncapi/sinch-verification-callbacks-asyncapi.yml
    description: >-
      The Sinch Verification API provides phone number verification through
      multiple methods including SMS, flashcalls, phone calls, and data
      verification. It enables developers to verify user identity by sending
      one-time codes or initiating automated verification flows. The API can be
      consumed directly via REST endpoints or through the Sinch Verification
      SDKs, and supports configurable verification workflows to optimize cost
      and conversion rates.
  - aid: sinch:conversation-api
    name: Sinch Conversation API
    tags:
      - Messaging
      - Omnichannel
      - WhatsApp
      - RCS
      - Facebook Messenger
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://us.conversation.api.sinch.com
    humanURL: https://developers.sinch.com/docs/conversation
    properties:
      - url: https://developers.sinch.com/docs/conversation/api-reference
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-conversation-openapi.yml
      - type: AsyncAPI
        url: asyncapi/sinch-conversation-webhooks-asyncapi.yml
    description: >-
      The Sinch Conversation API is an omnichannel messaging platform that
      enables developers to send and receive messages across multiple channels
      including SMS, RCS, WhatsApp, Facebook Messenger, Instagram, Viber,
      Telegram, KakaoTalk, and LINE through a single unified API. It provides
      contact management, conversation tracking, message templating, and webhook
      callbacks for real-time event handling. The API normalizes message formats
      across channels, allowing developers to build multichannel messaging
      experiences without channel-specific integrations.
  - aid: sinch:numbers-api
    name: Sinch Numbers API
    tags:
      - Phone Numbers
      - Provisioning
      - Telephony
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://numbers.api.sinch.com
    humanURL: https://developers.sinch.com/docs/numbers
    properties:
      - url: https://developers.sinch.com/docs/numbers/api-reference/numbers/available-number
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-numbers-openapi.yml
    description: >-
      The Sinch Numbers API enables developers to programmatically search for,
      purchase, configure, and manage phone numbers across multiple countries.
      It supports local, national, mobile, and toll-free number types that can
      be used with Sinch SMS, Voice, and Conversation APIs. The API provides
      endpoints for listing available numbers by region and type, activating
      numbers, updating number configurations, and releasing numbers when they
      are no longer needed.
  - aid: sinch:fax-api
    name: Sinch Fax API
    tags:
      - Fax
      - Documents
      - Healthcare
      - HIPAA
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://fax.api.sinch.com
    humanURL: https://developers.sinch.com/docs/fax
    properties:
      - url: https://developers.sinch.com/docs/fax/api-reference
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-fax-openapi.yml
    description: >-
      The Sinch Fax API allows developers to send and receive faxes
      programmatically at scale. It supports sending faxes to single or multiple
      recipients, downloading received faxes, and managing fax numbers. The API
      is HIPAA, SOC 2 Type 1, and GDPR compliant, making it suitable for
      healthcare and other regulated industries that require secure document
      transmission. It integrates with the Sinch Numbers API for provisioning
      fax-capable phone numbers.
  - aid: sinch:elastic-sip-trunking-api
    name: Sinch Elastic SIP Trunking API
    tags:
      - SIP
      - Trunking
      - Voice
      - Telephony
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://elastic-trunking.api.sinch.com
    humanURL: https://developers.sinch.com/docs/est
    properties:
      - url: https://developers.sinch.com/docs/est/api-reference/est/sip-endpoints
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-elastic-sip-trunking-openapi.yml
    description: >-
      The Sinch Elastic SIP Trunking (EST) API enables developers to
      programmatically create and manage SIP trunks for connecting existing
      telephony infrastructure to the Sinch network. It provides endpoints for
      managing SIP endpoints, trunk configurations, and access control lists.
      The API supports elastic scaling of voice capacity without requiring
      fixed-capacity commitments, allowing businesses to connect their PBX
      systems, contact centers, or communication platforms to global PSTN
      connectivity.
  - aid: sinch:provisioning-api
    name: Sinch Provisioning API
    tags:
      - Provisioning
      - Configuration
      - Messaging
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://provisioning.api.sinch.com
    humanURL: https://developers.sinch.com/docs/provisioning-api
    properties:
      - url: https://developers.sinch.com/docs/provisioning-api/api-reference
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-provisioning-openapi.yml
    description: >-
      The Sinch Provisioning API allows developers to programmatically set up
      senders, accounts, and templates on the messaging platforms used by the
      Sinch Conversation API. It provides endpoints for configuring messaging
      channel integrations, managing sender identities, and setting up message
      templates for approval. This API streamlines the onboarding process for
      new messaging channels and automates the configuration that would
      otherwise require manual setup through dashboards.
  - aid: sinch:registration-api
    name: Sinch Registration API
    tags:
      - Registration
      - Sender ID
      - Compliance
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://registration.api.sinch.com
    humanURL: https://developers.sinch.com/docs/registration-api
    properties:
      - url: https://developers.sinch.com/docs/registration-api/api-reference
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-registration-openapi.yml
    description: >-
      The Sinch Registration API provides endpoints for managing sender ID
      registrations required by various markets and regulatory bodies. It enables
      developers to retrieve market-specific requirements, create and submit
      registrations for sender IDs, and track the status of registration
      applications. This API helps businesses comply with local messaging
      regulations across different countries where sender registration is
      mandatory for SMS delivery.
  - aid: sinch:brands-api
    name: Sinch Brands API
    tags:
      - Brands
      - Identity
      - Messaging
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://brands.api.sinch.com
    humanURL: https://developers.sinch.com/docs/brands
    properties:
      - url: https://developers.sinch.com/docs/brands/api-reference/brands/overview
        type: Documentation
      - type: OpenAPI
        url: openapi/sinch-brands-openapi.yml
    description: >-
      The Sinch Brands API allows developers to create, update, and manage
      customer brand profiles used across Sinch messaging products. Brands
      represent the business identity associated with messaging campaigns and
      sender registrations. The API provides endpoints for creating brand
      records, updating brand details, listing brands, and deleting brands,
      enabling programmatic management of the brand entities required for
      compliant business messaging.
