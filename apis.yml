- aid: sinch:verification-api
  name: Sinch Verification API
  description: The Sinch Verification API provides phone number verification through
    multiple methods including SMS, flashcalls, phone calls, and data verification.
    It enables developers to verify user identity by sending one-time codes or initiating
    automated verification flows.
  humanURL: https://developers.sinch.com/docs/verification
  baseURL: https://verification.api.sinch.com
