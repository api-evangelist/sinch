- aid: sinch:fax-api
  name: Sinch Fax API
  description: The Sinch Fax API allows developers to send and receive faxes programmatically
    at scale. It supports sending faxes to single or multiple recipients, downloading
    received faxes, and managing fax numbers. HIPAA, SOC 2 Type 1, and GDPR compliant.
  humanURL: https://developers.sinch.com/docs/fax
