- aid: sinch:voice-api
  name: Sinch Voice API
  description: The Sinch Voice API is a programmable voice platform that allows developers
    to make, receive, and manage voice calls over PSTN, SIP, and in-app channels.
    It supports text-to-speech in over 115 languages, interactive voice response (IVR)
    menus, call recording, transcription, number masking, and conferencing.
  humanURL: https://developers.sinch.com/docs/voice
  baseURL: https://calling.api.sinch.com
  tags:
