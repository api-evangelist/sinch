apis:
- aid: sinch:sms-api
  name: Sinch SMS API
  description: The Sinch SMS API enables developers to send and receive SMS messages
    globally at scale. It supports batch messaging with scheduled delivery, message
    templates, delivery reports, and inbound message handling via webhooks. The API
    provides group management for organizing recipients, automatic message encoding
    optimization, and supports both transactional and marketing use cases across carriers
    worldwide.
  humanURL: https://developers.sinch.com/docs/sms
  baseURL: https://us.sms.api.sinch.com
  tags:
  - SMS
  - Messaging
  - Batch Messaging
  properties:
  - type: Documentation
    url: https://developers.sinch.com/docs/sms
  - type: OpenAPI
    url: https://raw.githubusercontent.com/api-evangelist/sinch/refs/heads/main/openapi/sinch-sms-openapi.yml
  - type: AsyncAPI
    url: https://raw.githubusercontent.com/api-evangelist/sinch/refs/heads/main/asyncapi/sinch-sms-webhooks-asyncapi.yml
  - url: graphql/sinch-graphql.md
    type: GraphQL
- aid: sinch:conversation-api
  name: Sinch Conversation API
  description: The Sinch Conversation API is an omnichannel messaging platform that
    enables developers to send and receive messages across multiple channels including
    SMS, RCS, WhatsApp, Facebook Messenger, Instagram, Viber, Telegram, KakaoTalk,
    and LINE through a single unified API. It provides contact management, conversation
    tracking, message templating, and webhook callbacks for real-time event handling.
  humanURL: https://developers.sinch.com/docs/conversation
  baseURL: https://us.conversation.api.sinch.com
  tags:
  - Conversation
  - Omnichannel
  - WhatsApp
  - Messaging
