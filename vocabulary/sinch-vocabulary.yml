vocabulary:
  name: Sinch Vocabulary
  description: >-
    Domain vocabulary for the Sinch cloud communications platform covering
    SMS, voice, verification, omnichannel messaging, and number management APIs.
  version: '1.0'
  created: '2026-05-02'
  modified: '2026-05-02'
  terms:
    - term: Batch
      definition: >-
        A group of SMS messages sent to one or more recipients in a single API
        call. Supports parameterized messages, scheduled delivery, and delivery reports.
      aliases:
        - SMS Batch
        - Message Batch

    - term: Conversation
      definition: >-
        A thread of messages between an application and a contact, tracked
        across channels. Enables omnichannel continuity when a customer switches
        from SMS to WhatsApp or another channel.
      aliases:
        - Thread
        - Conversation Thread

    - term: Contact
      definition: >-
        A person or entity with one or more channel identities (phone numbers,
        social IDs) managed in the Sinch Conversation API contact directory.

    - term: Channel
      definition: >-
        A messaging medium such as SMS, RCS, WhatsApp, Facebook Messenger,
        Instagram, Viber, Telegram, KakaoTalk, or LINE supported by the
        Sinch Conversation API.
      related:
        - Omnichannel

    - term: Channel Identity
      definition: >-
        A channel-specific identifier for a contact, such as a phone number
        for SMS or a PSID for Facebook Messenger.

    - term: Service Plan
      definition: >-
        A Sinch SMS service configuration identified by a service_plan_id,
        associated with a phone number or sender ID for sending SMS messages.
      aliases:
        - Service Plan ID

    - term: Project
      definition: >-
        A Sinch organizational unit that groups resources including phone numbers,
        apps, contacts, and conversations. Identified by a project_id.
      aliases:
        - Sinch Project

    - term: App
      definition: >-
        A Conversation API application that connects to messaging channel integrations
        and defines webhook callbacks for inbound messages and events.
      aliases:
        - Conversation App

    - term: Callout
      definition: >-
        An outbound voice call initiated via the Sinch Voice API. Supports
        text-to-speech, custom audio, and IVR using SVAML instructions.
      aliases:
        - Voice Callout

    - term: SVAML
      definition: >-
        Sinch Voice Application Markup Language - a JSON-based instruction set
        used to control active calls with actions like play, say, hangup,
        conference, and runMenu for IVR.

    - term: Verification
      definition: >-
        A flow for verifying a user's phone number ownership via SMS OTP,
        flashcall, or automated phone call. Methods: sms, flashcall, callout.
      aliases:
        - Phone Verification
        - OTP Verification

    - term: Flashcall
      definition: >-
        A verification method where Sinch places a silent call to the user's
        number; the user reads the last digits of the caller ID as the OTP.

    - term: Delivery Report
      definition: >-
        A status update about whether an SMS message was delivered to the
        recipient's handset. Types: none, summary, full, per_recipient.
      aliases:
        - DLR

    - term: SIP Trunk
      definition: >-
        A virtual connection between a customer's PBX or telephony system and
        the Sinch network, enabling PSTN calls via SIP protocol at elastic scale.

    - term: Brand
      definition: >-
        A business entity record required for compliant business messaging (A2P SMS,
        10DLC). Contains company identity, address, and contact information.

    - term: Registration
      definition: >-
        The process of registering a sender ID or campaign with carriers for
        compliant A2P messaging in regulated markets like the US (10DLC).
      aliases:
        - Sender Registration
        - Campaign Registration

    - term: 10DLC
      definition: >-
        10-Digit Long Code - a US carrier standard for A2P SMS requiring brand
        and campaign registration to send business SMS from local phone numbers.

    - term: Alpha Sender
      definition: >-
        An alphanumeric string (up to 11 characters) used as a sender ID for
        SMS messages instead of a phone number. Not supported in all countries.

    - term: Phone Number
      definition: >-
        A physical or virtual telephone number purchased from Sinch, used as
        a sender for SMS, voice, or fax. Number types: local, national, mobile, toll-free.

    - term: Webhook
      definition: >-
        An HTTP callback URL configured to receive real-time events from Sinch
        when messages are received, delivered, or status changes occur.
      aliases:
        - Callback
        - Event Callback
