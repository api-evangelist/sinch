naftiko: 1.0.0-alpha2
info:
  label: Sinch Voice and Verification
  description: Unified voice and identity verification workflow combining the Sinch Voice API and Verification API. Used by
    identity platforms, financial services, healthcare applications, and any business needing to verify user phone numbers
    via OTP SMS, flashcalls, or automated phone verification calls.
  tags:
  - Voice
  - Verification
  - Identity
  - OTP
  - Authentication
  - Calling
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SINCH_APPLICATION_KEY: SINCH_APPLICATION_KEY
    SINCH_APPLICATION_SECRET: SINCH_APPLICATION_SECRET
capability:
  consumes:
  - type: http
    namespace: sinch-voice
    baseUri: https://calling.api.sinch.com
    description: Sinch Voice API for programmable voice calls
    authentication:
      type: basic
      username: '{{SINCH_APPLICATION_KEY}}'
      password: '{{SINCH_APPLICATION_SECRET}}'
    resources:
    - name: callouts
      path: /calling/v1/callouts
      description: Initiate outbound voice calls
      operations:
      - name: make-callout
        method: POST
        description: Make a voice callout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            method: '{{tools.method}}'
            ttsCallout: '{{tools.ttsCallout}}'
    - name: calls
      path: /calling/v1/calls/id/{callId}
      description: Get and update active calls
      operations:
      - name: get-call
        method: GET
        description: Get call information
        inputParameters:
        - name: callId
          in: path
          type: string
          required: true
          description: The call identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-call
        method: PATCH
        description: Update an active call
        inputParameters:
        - name: callId
          in: path
          type: string
          required: true
          description: The call identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            instructions: '{{tools.instructions}}'
  - type: http
    namespace: sinch-verification
    baseUri: https://verification.api.sinch.com
    description: Sinch Verification API for phone number verification
    authentication:
      type: basic
      username: '{{SINCH_APPLICATION_KEY}}'
      password: '{{SINCH_APPLICATION_SECRET}}'
    resources:
    - name: verifications
      path: /verification/v1/verifications
      description: Start verification flows
      operations:
      - name: start-verification
        method: POST
        description: Start a verification flow for a phone number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            identity: '{{tools.identity}}'
            method: '{{tools.method}}'
    - name: verification-by-id
      path: /verification/v1/verifications/id/{id}
      description: Report and query verification results
      operations:
      - name: report-verification-by-id
        method: PUT
        description: Report verification result by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The verification identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            method: '{{tools.method}}'
            sms: '{{tools.sms}}'
  exposes:
  - type: rest
    port: 8081
    namespace: voice-and-verification-api
    description: Unified REST API for Sinch voice calls and phone number verification.
    resources:
    - path: /v1/callouts
      name: callouts
      description: Make outbound voice calls
      operations:
      - method: POST
        name: make-callout
        description: Initiate a voice callout with TTS or custom audio
        call: sinch-voice.make-callout
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/{callId}
      name: calls
      description: Manage active voice calls
      operations:
      - method: GET
        name: get-call
        description: Get information about a voice call
        call: sinch-voice.get-call
        with:
          callId: rest.callId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/verifications
      name: verifications
      description: Start phone number verification flows
      operations:
      - method: POST
        name: start-verification
        description: Start a phone number verification via SMS or call
        call: sinch-verification.start-verification
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: voice-and-verification-mcp
    transport: http
    description: MCP server for AI-assisted voice calling and phone number verification.
    tools:
    - name: make-voice-call
      description: Make an outbound voice call with text-to-speech or IVR
      hints:
        readOnly: false
        destructive: false
      call: sinch-voice.make-callout
      outputParameters:
      - type: object
        mapping: $.
    - name: get-call-status
      description: Get the status and details of a voice call
      hints:
        readOnly: true
        openWorld: false
      call: sinch-voice.get-call
      with:
        callId: tools.callId
      outputParameters:
      - type: object
        mapping: $.
    - name: start-sms-verification
      description: Start a phone number verification flow sending an OTP via SMS
      hints:
        readOnly: false
        destructive: false
      call: sinch-verification.start-verification
      with:
        method: sms
      outputParameters:
      - type: object
        mapping: $.
    - name: start-call-verification
      description: Start a phone number verification via automated phone call
      hints:
        readOnly: false
        destructive: false
      call: sinch-verification.start-verification
      with:
        method: callout
      outputParameters:
      - type: object
        mapping: $.
    - name: report-verification-code
      description: Report the OTP code entered by the user to complete verification
      hints:
        readOnly: false
        destructive: false
      call: sinch-verification.report-verification-by-id
      outputParameters:
      - type: object
        mapping: $.
