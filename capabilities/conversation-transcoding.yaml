naftiko: 1.0.0-alpha2
info:
  label: Sinch Conversation API — Transcoding
  description: 'Sinch Conversation API — Transcoding. 1 operations. Lead operation: Transcode a Message. Self-contained Naftiko
    capability covering one Sinch business surface.'
  tags:
  - Sinch
  - Transcoding
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINCH_API_KEY: SINCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversation-transcoding
    baseUri: https://us.conversation.api.sinch.com
    description: Sinch Conversation API — Transcoding business capability. Self-contained, no shared references.
    resources:
    - name: v1-projects-project_id-messages:transcode
      path: /v1/projects/{project_id}/messages:transcode
      operations:
      - name: transcodemessage
        method: POST
        description: Transcode a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SINCH_API_KEY}}'
  exposes:
  - type: rest
    namespace: conversation-transcoding-rest
    port: 8080
    description: REST adapter for Sinch Conversation API — Transcoding. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/projects/{project-id}/messages-transcode
      name: v1-projects-project-id-messages-transcode
      description: REST surface for v1-projects-project_id-messages:transcode.
      operations:
      - method: POST
        name: transcodemessage
        description: Transcode a Message
        call: conversation-transcoding.transcodemessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversation-transcoding-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sinch Conversation API — Transcoding. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: transcode-message
      description: Transcode a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversation-transcoding.transcodemessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
