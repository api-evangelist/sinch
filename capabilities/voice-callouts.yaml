naftiko: 1.0.0-alpha2
info:
  label: Sinch Voice API — Callouts
  description: 'Sinch Voice API — Callouts. 1 operations. Lead operation: Make a Callout. Self-contained Naftiko capability
    covering one Sinch business surface.'
  tags:
  - Sinch
  - Callouts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINCH_API_KEY: SINCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: voice-callouts
    baseUri: https://calling.api.sinch.com
    description: Sinch Voice API — Callouts business capability. Self-contained, no shared references.
    resources:
    - name: calling-v1-callouts
      path: /calling/v1/callouts
      operations:
      - name: createcallout
        method: POST
        description: Make a Callout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SINCH_USER}}'
      password: '{{env.SINCH_PASS}}'
  exposes:
  - type: rest
    namespace: voice-callouts-rest
    port: 8080
    description: REST adapter for Sinch Voice API — Callouts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/calling/v1/callouts
      name: calling-v1-callouts
      description: REST surface for calling-v1-callouts.
      operations:
      - method: POST
        name: createcallout
        description: Make a Callout
        call: voice-callouts.createcallout
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: voice-callouts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sinch Voice API — Callouts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: make-callout
      description: Make a Callout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: voice-callouts.createcallout
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
