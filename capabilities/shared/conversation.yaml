naftiko: "1.0.0-alpha1"

info:
  label: "Sinch Conversation API"
  description: >-
    The Sinch Conversation API is an omnichannel messaging platform supporting
    SMS, RCS, WhatsApp, Facebook Messenger, Instagram, Viber, Telegram, and more
    through a single unified API with contact management and conversation tracking.
  tags:
    - Conversation
    - Omnichannel
    - WhatsApp
    - Messaging
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SINCH_API_TOKEN: SINCH_API_TOKEN
      SINCH_PROJECT_ID: SINCH_PROJECT_ID

capability:
  consumes:
    - type: http
      namespace: sinch-conversation
      baseUri: https://us.conversation.api.sinch.com
      description: "Sinch Conversation API for omnichannel messaging"
      authentication:
        type: bearer
        token: "{{SINCH_API_TOKEN}}"
      resources:
        - name: messages
          path: /v1/projects/{project_id}/messages
          description: Send and manage messages across channels
          operations:
            - name: send-message
              method: POST
              description: Send a message across any supported channel
              inputParameters:
                - name: project_id
                  in: path
                  type: string
                  required: true
                  description: The Sinch project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  app_id: "{{tools.app_id}}"
                  recipient: "{{tools.recipient}}"
                  message: "{{tools.message}}"
            - name: list-messages
              method: GET
              description: List messages
              inputParameters:
                - name: project_id
                  in: path
                  type: string
                  required: true
                  description: The Sinch project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: contacts
          path: /v1/projects/{project_id}/contacts
          description: Manage conversation contacts
          operations:
            - name: create-contact
              method: POST
              description: Create a new contact
              inputParameters:
                - name: project_id
                  in: path
                  type: string
                  required: true
                  description: The Sinch project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  channel_identities: "{{tools.channel_identities}}"
                  display_name: "{{tools.display_name}}"
            - name: list-contacts
              method: GET
              description: List contacts
              inputParameters:
                - name: project_id
                  in: path
                  type: string
                  required: true
                  description: The Sinch project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: conversations
          path: /v1/projects/{project_id}/conversations
          description: Manage conversation threads
          operations:
            - name: list-conversations
              method: GET
              description: List conversations
              inputParameters:
                - name: project_id
                  in: path
                  type: string
                  required: true
                  description: The Sinch project identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: sinch-conversation-rest
      resources:
        - path: /v1/messages
          name: messages
          description: Send and list messages
          operations:
            - method: POST
              name: send-message
              description: Send a message
              call: "sinch-conversation.send-message"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-messages
              description: List messages
              call: "sinch-conversation.list-messages"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/contacts
          name: contacts
          description: Manage contacts
          operations:
            - method: POST
              name: create-contact
              description: Create a contact
              call: "sinch-conversation.create-contact"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-contacts
              description: List contacts
              call: "sinch-conversation.list-contacts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: sinch-conversation-mcp
      transport: http
      tools:
        - name: send-message
          description: Send a message across any supported channel (SMS, WhatsApp, RCS, etc.)
          hints:
            readOnly: false
            destructive: false
          call: "sinch-conversation.send-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-messages
          description: List messages in a conversation
          hints:
            readOnly: true
            openWorld: true
          call: "sinch-conversation.list-messages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-contact
          description: Create a new omnichannel contact
          hints:
            readOnly: false
            destructive: false
          call: "sinch-conversation.create-contact"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-contacts
          description: List contacts in the project
          hints:
            readOnly: true
            openWorld: true
          call: "sinch-conversation.list-contacts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-conversations
          description: List conversation threads
          hints:
            readOnly: true
            openWorld: true
          call: "sinch-conversation.list-conversations"
          outputParameters:
            - type: object
              mapping: "$."
