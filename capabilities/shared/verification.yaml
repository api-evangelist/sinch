naftiko: "1.0.0-alpha1"

info:
  label: "Sinch Verification API"
  description: >-
    The Sinch Verification API provides phone number verification through
    SMS, flashcalls, phone calls, and data verification methods for user
    identity verification with one-time codes.
  tags:
    - Verification
    - Identity
    - OTP
    - Authentication
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SINCH_APPLICATION_KEY: SINCH_APPLICATION_KEY
      SINCH_APPLICATION_SECRET: SINCH_APPLICATION_SECRET

capability:
  consumes:
    - type: http
      namespace: sinch-verification
      baseUri: https://verification.api.sinch.com
      description: "Sinch Verification API for phone number verification"
      authentication:
        type: basic
        username: "{{SINCH_APPLICATION_KEY}}"
        password: "{{SINCH_APPLICATION_SECRET}}"
      resources:
        - name: verifications
          path: /verification/v1/verifications
          description: Start verification flows
          operations:
            - name: start-verification
              method: POST
              description: Start a verification flow for a phone number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  identity: "{{tools.identity}}"
                  method: "{{tools.method}}"
        - name: verification-by-id
          path: /verification/v1/verifications/id/{id}
          description: Report and query verification results
          operations:
            - name: report-verification-by-id
              method: PUT
              description: Report verification result by ID
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: The verification identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  method: "{{tools.method}}"
                  sms: "{{tools.sms}}"

  exposes:
    - type: rest
      port: 8104
      namespace: sinch-verification-rest
      resources:
        - path: /v1/verifications
          name: verifications
          description: Start verification flows
          operations:
            - method: POST
              name: start-verification
              description: Start a phone number verification
              call: "sinch-verification.start-verification"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: sinch-verification-mcp
      transport: http
      tools:
        - name: start-verification
          description: Start a phone number verification flow via SMS, flashcall, or call
          hints:
            readOnly: false
            destructive: false
          call: "sinch-verification.start-verification"
          outputParameters:
            - type: object
              mapping: "$."
        - name: report-verification
          description: Report the verification code provided by the user
          hints:
            readOnly: false
            destructive: false
          call: "sinch-verification.report-verification-by-id"
          outputParameters:
            - type: object
              mapping: "$."
