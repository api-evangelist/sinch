naftiko: "1.0.0-alpha1"

info:
  label: "Sinch Voice API"
  description: >-
    The Sinch Voice API is a programmable voice platform for making, receiving,
    and managing voice calls over PSTN, SIP, and in-app channels with TTS,
    IVR, call recording, transcription, and conferencing support.
  tags:
    - Voice
    - Calling
    - IVR
    - Telephony
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SINCH_APPLICATION_KEY: SINCH_APPLICATION_KEY
      SINCH_APPLICATION_SECRET: SINCH_APPLICATION_SECRET

capability:
  consumes:
    - type: http
      namespace: sinch-voice
      baseUri: https://calling.api.sinch.com
      description: "Sinch Voice API for programmable voice calls"
      authentication:
        type: basic
        username: "{{SINCH_APPLICATION_KEY}}"
        password: "{{SINCH_APPLICATION_SECRET}}"
      resources:
        - name: callouts
          path: /calling/v1/callouts
          description: Initiate outbound voice calls
          operations:
            - name: make-callout
              method: POST
              description: Make a voice callout
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  method: "{{tools.method}}"
                  ttsCallout: "{{tools.ttsCallout}}"
        - name: calls
          path: /calling/v1/calls/id/{callId}
          description: Get and update active calls
          operations:
            - name: get-call
              method: GET
              description: Get call information
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: The call identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-call
              method: PATCH
              description: Update an active call
              inputParameters:
                - name: callId
                  in: path
                  type: string
                  required: true
                  description: The call identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  instructions: "{{tools.instructions}}"

  exposes:
    - type: rest
      port: 8103
      namespace: sinch-voice-rest
      resources:
        - path: /v1/callouts
          name: callouts
          description: Make voice callouts
          operations:
            - method: POST
              name: make-callout
              description: Initiate a voice call
              call: "sinch-voice.make-callout"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/calls/{callId}
          name: calls
          description: Manage active calls
          operations:
            - method: GET
              name: get-call
              description: Get call information
              call: "sinch-voice.get-call"
              with:
                callId: "rest.callId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: sinch-voice-mcp
      transport: http
      tools:
        - name: make-voice-callout
          description: Make an outbound voice call or TTS callout
          hints:
            readOnly: false
            destructive: false
          call: "sinch-voice.make-callout"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-call-info
          description: Get information about a voice call
          hints:
            readOnly: true
            openWorld: false
          call: "sinch-voice.get-call"
          with:
            callId: "tools.callId"
          outputParameters:
            - type: object
              mapping: "$."
