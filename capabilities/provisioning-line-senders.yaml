naftiko: 1.0.0-alpha2
info:
  label: Sinch Provisioning API — LINE Senders
  description: 'Sinch Provisioning API — LINE Senders. 2 operations. Lead operation: List Line Senders. Self-contained Naftiko
    capability covering one Sinch business surface.'
  tags:
  - Sinch
  - LINE Senders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINCH_API_KEY: SINCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: provisioning-line-senders
    baseUri: https://provisioning.api.sinch.com
    description: Sinch Provisioning API — LINE Senders business capability. Self-contained, no shared references.
    resources:
    - name: v1-projects-project_id-line-senders
      path: /v1/projects/{project_id}/line/senders
      operations:
      - name: listlinesenders
        method: GET
        description: List Line Senders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlinesender
        method: POST
        description: Create a Line Sender
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SINCH_API_KEY}}'
  exposes:
  - type: rest
    namespace: provisioning-line-senders-rest
    port: 8080
    description: REST adapter for Sinch Provisioning API — LINE Senders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/projects/{project-id}/line/senders
      name: v1-projects-project-id-line-senders
      description: REST surface for v1-projects-project_id-line-senders.
      operations:
      - method: GET
        name: listlinesenders
        description: List Line Senders
        call: provisioning-line-senders.listlinesenders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlinesender
        description: Create a Line Sender
        call: provisioning-line-senders.createlinesender
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: provisioning-line-senders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sinch Provisioning API — LINE Senders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-line-senders
      description: List Line Senders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: provisioning-line-senders.listlinesenders
      outputParameters:
      - type: object
        mapping: $.
    - name: create-line-sender
      description: Create a Line Sender
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: provisioning-line-senders.createlinesender
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
