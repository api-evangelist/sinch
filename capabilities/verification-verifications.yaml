      operations:
      - name: startverification
        method: POST
        description: Start a Verification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: verification-v1-verifications-id-id
      path: /verification/v1/verifications/id/{id}
      operations:
      - name: reportverificationbyid
        method: PUT
        description: Report a Verification by Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The verification request identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: verification-v1-verifications-id-id-status
