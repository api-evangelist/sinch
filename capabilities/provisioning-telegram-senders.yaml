naftiko: 1.0.0-alpha2
info:
  label: Sinch Provisioning API — Telegram Senders
  description: 'Sinch Provisioning API — Telegram Senders. 2 operations. Lead operation: List Telegram Senders. Self-contained
    Naftiko capability covering one Sinch business surface.'
  tags:
  - Sinch
  - Telegram Senders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINCH_API_KEY: SINCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: provisioning-telegram-senders
    baseUri: https://provisioning.api.sinch.com
    description: Sinch Provisioning API — Telegram Senders business capability. Self-contained, no shared references.
    resources:
    - name: v1-projects-project_id-telegram-senders
      path: /v1/projects/{project_id}/telegram/senders
      operations:
      - name: listtelegramsenders
        method: GET
        description: List Telegram Senders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtelegramsender
        method: POST
        description: Create a Telegram Sender
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SINCH_API_KEY}}'
  exposes:
  - type: rest
    namespace: provisioning-telegram-senders-rest
    port: 8080
    description: REST adapter for Sinch Provisioning API — Telegram Senders. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/projects/{project-id}/telegram/senders
      name: v1-projects-project-id-telegram-senders
      description: REST surface for v1-projects-project_id-telegram-senders.
      operations:
      - method: GET
        name: listtelegramsenders
        description: List Telegram Senders
        call: provisioning-telegram-senders.listtelegramsenders
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtelegramsender
        description: Create a Telegram Sender
        call: provisioning-telegram-senders.createtelegramsender
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: provisioning-telegram-senders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sinch Provisioning API — Telegram Senders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-telegram-senders
      description: List Telegram Senders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: provisioning-telegram-senders.listtelegramsenders
      outputParameters:
      - type: object
        mapping: $.
    - name: create-telegram-sender
      description: Create a Telegram Sender
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: provisioning-telegram-senders.createtelegramsender
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
