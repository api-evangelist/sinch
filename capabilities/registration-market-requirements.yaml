naftiko: 1.0.0-alpha2
info:
  label: Sinch Registration API — Market Requirements
  description: 'Sinch Registration API — Market Requirements. 2 operations. Lead operation: List Markets. Self-contained Naftiko
    capability covering one Sinch business surface.'
  tags:
  - Sinch
  - Market Requirements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINCH_API_KEY: SINCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: registration-market-requirements
    baseUri: https://registration.api.sinch.com
    description: Sinch Registration API — Market Requirements business capability. Self-contained, no shared references.
    resources:
    - name: v1-projects-project_id-markets
      path: /v1/projects/{project_id}/markets
      operations:
      - name: listmarkets
        method: GET
        description: List Markets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-projects-project_id-markets-market_id
      path: /v1/projects/{project_id}/markets/{market_id}
      operations:
      - name: getmarket
        method: GET
        description: Get Market Requirements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: market_id
          in: path
          type: string
          description: The market identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.SINCH_API_KEY}}'
  exposes:
  - type: rest
    namespace: registration-market-requirements-rest
    port: 8080
    description: REST adapter for Sinch Registration API — Market Requirements. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/projects/{project-id}/markets
      name: v1-projects-project-id-markets
      description: REST surface for v1-projects-project_id-markets.
      operations:
      - method: GET
        name: listmarkets
        description: List Markets
        call: registration-market-requirements.listmarkets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/projects/{project-id}/markets/{market-id}
      name: v1-projects-project-id-markets-market-id
      description: REST surface for v1-projects-project_id-markets-market_id.
      operations:
      - method: GET
        name: getmarket
        description: Get Market Requirements
        call: registration-market-requirements.getmarket
        with:
          market_id: rest.market_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: registration-market-requirements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sinch Registration API — Market Requirements. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-markets
      description: List Markets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: registration-market-requirements.listmarkets
      outputParameters:
      - type: object
        mapping: $.
    - name: get-market-requirements
      description: Get Market Requirements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: registration-market-requirements.getmarket
      with:
        market_id: tools.market_id
      outputParameters:
      - type: object
        mapping: $.
